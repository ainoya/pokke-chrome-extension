name: tagpr
on:
  push:
    branches: ["main"]
jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # Authentication
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: 1053852
          private-key: ${{ secrets.AINOYA_BOT_PRIVATE_KEY }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'

      # Pre-release logic
      - name: increment chrome extnsion manifest.json version
        run: |
          CURRENT_VERSION=$(jq -r '.version' src/manifest.json)
          NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{if (NF==1) {$1+=1} else {$NF+=1}; OFS="."; print $0}' | sed 's/ /./g')
          jq --arg new_version $NEW_VERSION '.version = $new_version' src/manifest.json > src/manifest.json.tmp
          mv src/manifest.json.tmp src/manifest.json
      
      - name: Install dependencies
        run: pnpm install
      
      # Linting/Fixing (matches "biome check fix" from reference refactored for pnpm/lint script)
      - name: biome check fix
        run: pnpm run lint

      # Tagpr
      - uses: Songmu/tagpr@v1
        id: tagpr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # run job to upload artifact if git tagged
  upload:
    runs-on: ubuntu-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: |
          pnpm run build:zip
      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tagpr.outputs.tag }}
          files: |
            chrome-extension.zip
